// Parses the CSV and builds the levels array.
// First 2 clues form tier 1 (both must be solved), then groups of 3.
parseCSV = (csv) => {
	rows = [];
	i = 0;
	while (i < csv.length) {
		fields = [];
		while (i < csv.length && csv[i] !== '\n') {
			if (csv[i] === '"') {
				i++; val = '';
				while (i < csv.length) {
					if (csv[i] === '"' && csv[i+1] === '"') { val += '"'; i += 2; }
					else if (csv[i] === '"') { i++; break; }
					else { val += csv[i++]; }
				}
				fields.push(val);
			} else {
				val = '';
				while (i < csv.length && csv[i] !== ',' && csv[i] !== '\n') val += csv[i++];
				fields.push(val);
			}
			if (csv[i] === ',') i++;
		}
		if (csv[i] === '\n') i++;
		if (fields.length >= 2) rows.push(fields);
	}
	return rows;
}

// How many extra completions are needed to unlock each successive tier.
// Entry 0 = after tier 1 (the first 2 clues), entry 1 = after tier 2, etc.
// The last entry is the requirement to unlock the final solo clue.
																															TIER_REQUIREMENTS = [2, 2, 2, 2, 2, 2, 2, 3, 2, 3, 3, 4];

buildLevels = (csv) => {
	rows = parseCSV(csv);
	out = [];
	let cumReq = 0;
	let ri = 0;

	rowToEntry = (row, first) => {
		clue  = row[0].trim();
		ans   = (row[1] || '').trim().toLowerCase();
		exp   = (row[2] || '').trim() || undefined;
		entry = { gram: clue, ans: ans };
		if (exp) entry.exp = exp;
		if (first) entry.unlocked = true;
		return entry;
	}

	// Tier 1: first 2 rows
	out.push(rowToEntry(rows[0], true));
	if (rows.length > 1) out.push(rowToEntry(rows[1]));
	cumReq += TIER_REQUIREMENTS[ri++];
	out.push({ required: cumReq });

	// Middle tiers: rows 2 to second-to-last, in groups of 3
	let r = 2;
	while (r < rows.length - 1) {
		let groupEnd = Math.min(r + 3, rows.length - 1);
		for (; r < groupEnd; r++) out.push(rowToEntry(rows[r]));
		if (r < rows.length - 1) {
			cumReq += ri < TIER_REQUIREMENTS.length ? TIER_REQUIREMENTS[ri++] : 3;
			out.push({ required: cumReq });
		}
	}

	// Requirement to unlock the final solo clue
	cumReq += ri < TIER_REQUIREMENTS.length ? TIER_REQUIREMENTS[ri++] : 1;
	out.push({ required: cumReq });

	// Final clue alone
	out.push(rowToEntry(rows[rows.length - 1]));
	out.push({});
	return out;
}

levels = buildLevels(CLUES_CSV);

cellsize = 10;

curlevel = levels[0]
progress = 0;

save= ()=>{
	localStorage.setItem('savedata', [JSON.stringify([progress, levels])])
}

load = () => {
	if(!localStorage.getItem('savedata')) return false;
	try {
		temp = JSON.parse(localStorage.getItem('savedata'));
		for(i in temp[1]){
			if(levels[i] && levels[i].gram) {
				temp[1][i].gram = levels[i].gram;
				temp[1][i].ans = levels[i].ans;
				temp[1][i].exp = levels[i].exp;
			}
		}
		// if saved level count doesn't match current, reset to avoid crashes
		if(temp[1].length !== levels.length) {
			progress = 0;
			return false;
		}
		[progress, levels] = temp;
	} catch(e) {
		localStorage.removeItem('savedata');
	}
}

			}else{

						</button>`
			}
		else{
			z--;

				r = level.required;

				}
			}

loadlevel = (i) => {
	levelMenuScroll = window.scrollY;
	if(!levels[i].gram){
		loadlevelmenu();
		return;
	}
	document.getElementById("game").innerHTML = `
	<div class="clue" id="cluebox"> ${formatClue(levels[i].gram)} </div>
	<input id = "input"> </input>
	<div id="explanation"></div>
	<br><br><br><br>
	<button id="back-fixed"> ← Back </button>
	${(levels[i].completed || DEBUG_REVEAL) ? `<button id="reveal">Reveal</button>` : ""}
	`

	revealSolved = () => {
		if (!levels[i].completed) {
			levels[i].completed = true;
			progress++;
			save();
		}
		rawAns = levels[i].ans.split(',')[0];
		document.getElementById("input").value = rawAns.replace(/\b\w/g, c => c.toUpperCase());
		document.getElementById("input").style.backgroundColor = "#dddd88";
		document.getElementById("input").disabled = true;
		document.getElementById("cluebox").style.backgroundColor = "#dddd88";

		isLastLevel = levels.slice(i + 1).every(l => !l.gram);
		let expText = levels[i].exp ? formatClue(levels[i].exp) : "";

		if (isLastLevel) {
			totalClues = levels.filter(l => l.gram).length;
			solvedClues = levels.filter(l => l.gram && l.completed).length;
			allSolved = solvedClues === totalClues;
			today = new Date();
			withinDay = today <= new Date("2026-06-13T23:59:59");

			expText = `Completion: <span class='def'><b>${solvedClues}/${totalClues}</b></span><br><br>`;
			if (allSolved) {
				expText += withinDay
					? `Wow, all solved within a day. That's our Mama.<br><br>`
					: `Wow, all complete!<br><br>`;
			}
			expText += `<b>Happy birthday Mama!</b><br><br>`;
			expText += allSolved
				? `Thank you for all the nice memories of all the people, places and cats.`
				: `Thank you for playing!`;
		}

		document.getElementById("explanation").innerHTML = `<div class="explanation"><b>Solved!</b>${expText ? "<br><br>" + expText : ""}</div>`;
	}

	if (levels[i].completed || DEBUG_REVEAL) document.getElementById("reveal").onclick = revealSolved;

	document.getElementById("input").focus();
	document.getElementById("input").onchange = (e) => {
		val = e.target.value.trim().toLowerCase().replace(/'/g, "");
		answers = levels[i].ans.split(',').map(a => a.replace(/'/g, ""));
		if (answers.includes(val) || (levels[i].gram == "DDXXSINX" && val.includes("+") && val.includes("sin") && val.includes("cos")) || (levels[i].gram == "BEEMOVIE" && val.includes("it one of your special skills"))) {
			bootout = false;
			if(!levels[i].completed){
				progress++;
				for(level of levels){
					if(level.required == progress) bootout = true;
				}
			}
			levels[i].completed = true;
			save();
			revealSolved();
		} else {
			e.target.classList.add("shake");
			setTimeout(() => e.target.classList.remove("shake"), 400);
			e.target.value = "";
		}
	}

	document.getElementById("back-fixed").onclick = () => {
		loadlevelmenu(true)
	}
}
